<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Hydroponie sans pompe en appartement</title>
  <desc id="desc">Illustration d'un petit système hydroponique sans pompe avec réservoir opaque, laitue, basilic et lumière douce pour débuter en appartement.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6fffe"/>
      <stop offset="100%" stop-color="#e4f8f6"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80dfea"/>
      <stop offset="100%" stop-color="#2daebd"/>
    </linearGradient>
    <linearGradient id="leafDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ad69d"/>
      <stop offset="100%" stop-color="#157957"/>
    </linearGradient>
    <linearGradient id="leafLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9cf0bf"/>
      <stop offset="100%" stop-color="#43bf86"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f6256" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="198" cy="150" r="154" fill="#dcfaf4"/>
  <circle cx="1038" cy="126" r="146" fill="#e4fbff"/>
  <rect x="0" y="655" width="1200" height="245" fill="#f8fbfc"/>

  <g opacity="0.7">
    <rect x="812" y="82" width="258" height="184" rx="26" fill="#fbffff" stroke="#cceff1" stroke-width="5"/>
    <line x1="941" y1="82" x2="941" y2="266" stroke="#d7eff2" stroke-width="4"/>
    <line x1="812" y1="174" x2="1070" y2="174" stroke="#d7eff2" stroke-width="4"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="154" y="178" width="896" height="456" rx="40" fill="#fbffff"/>
    <rect x="154" y="178" width="896" height="456" rx="40" fill="none" stroke="#cdece7" stroke-width="4"/>
  </g>

  <rect x="204" y="610" width="796" height="38" rx="19" fill="#d7e6ea"/>
  <rect x="262" y="648" width="32" height="94" rx="16" fill="#b7ccd2"/>
  <rect x="910" y="648" width="32" height="94" rx="16" fill="#b7ccd2"/>

  <g filter="url(#shadow)">
    <rect x="286" y="344" width="624" height="174" rx="44" fill="#17343a"/>
    <rect x="312" y="372" width="572" height="108" rx="30" fill="url(#water)"/>
    <rect x="312" y="372" width="572" height="108" rx="30" fill="none" stroke="#9be7ef" stroke-width="4"/>
    <rect x="348" y="330" width="140" height="58" rx="28" fill="#f9ffff" stroke="#d1ece8" stroke-width="4"/>
    <rect x="530" y="330" width="140" height="58" rx="28" fill="#f9ffff" stroke="#d1ece8" stroke-width="4"/>
    <rect x="712" y="330" width="140" height="58" rx="28" fill="#f9ffff" stroke="#d1ece8" stroke-width="4"/>
  </g>

  <g stroke="#d8d2c8" stroke-width="3" fill="none" opacity="0.92">
    <path d="M418 381c0 38 5 72 20 108"/>
    <path d="M600 381c0 42 0 76-16 110"/>
    <path d="M782 381c0 42-7 78-24 114"/>
  </g>

  <g>
    <path d="M390 330c-34-48-10-94 24-122 12 50 12 84-24 122z" fill="url(#leafDark)"/>
    <path d="M418 334c0-58 34-96 76-102-6 48-21 84-76 102z" fill="url(#leafLight)"/>
    <path d="M369 348c-24-28-19-61 6-84 12 31 14 56-6 84z" fill="url(#leafDark)"/>
    <path d="M446 351c-2-35 20-58 46-62-3 29-15 51-46 62z" fill="url(#leafLight)"/>
  </g>

  <g>
    <path d="M566 332c-28-37-16-80 16-106 13 42 14 75-16 106z" fill="url(#leafDark)"/>
    <path d="M592 336c0-46 28-78 60-84-3 39-16 69-60 84z" fill="url(#leafLight)"/>
    <path d="M548 354c-24-28-15-60 11-83 10 32 11 56-11 83z" fill="url(#leafDark)"/>
    <path d="M620 355c0-33 20-58 45-63-3 28-14 50-45 63z" fill="url(#leafLight)"/>
  </g>

  <g>
    <path d="M746 330c-24-48-2-95 32-120 3 51-3 84-32 120z" fill="url(#leafDark)"/>
    <path d="M774 332c6-57 42-90 84-92-11 46-29 79-84 92z" fill="url(#leafLight)"/>
    <path d="M724 351c-18-31-8-64 17-87 6 34 5 58-17 87z" fill="url(#leafDark)"/>
    <path d="M802 350c5-34 26-56 52-59-7 28-19 47-52 59z" fill="url(#leafLight)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="934" y="312" width="82" height="174" rx="24" fill="#13353c"/>
    <rect x="950" y="334" width="50" height="92" rx="16" fill="url(#water)"/>
    <rect x="950" y="334" width="50" height="92" rx="16" fill="none" stroke="#97e8ef" stroke-width="4"/>
    <circle cx="976" cy="448" r="14" fill="#2fb8c7"/>
    <path d="M976 298c18 24 28 42 28 56 0 16-12 28-28 28s-28-12-28-28c0-13 8-30 24-51l4-5z" fill="url(#water)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="212" y="102" width="294" height="110" rx="28" fill="#ffffff"/>
    <text x="250" y="148" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="800" fill="#0f6256">Systeme sans pompe</text>
    <text x="250" y="182" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="19" font-weight="600" fill="#3a7b84">un reservoir opaque, peu de pieces,</text>
    <text x="250" y="208" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="19" font-weight="600" fill="#3a7b84">un suivi facile pour debuter chez soi</text>
  </g>

  <g fill="#16343a">
    <text x="184" y="786" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-1.8">Hydroponie sans pompe en appartement</text>
    <text x="186" y="830" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="25" font-weight="600" fill="#3b7d85">propre, compacte, rassurante pour un premier essai</text>
  </g>
</svg>

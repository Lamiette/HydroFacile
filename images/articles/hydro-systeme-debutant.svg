<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Systeme hydroponique debutant en appartement</title>
  <desc id="desc">Illustration d'une installation hydroponique compacte en interieur avec salades, basilic, reservoir d'eau et fenetre lumineuse.</desc>
  <defs>
    <linearGradient id="bgTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#effffd"/>
      <stop offset="100%" stop-color="#dff7f8"/>
    </linearGradient>
    <linearGradient id="bgBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbffff"/>
      <stop offset="100%" stop-color="#eef6f8"/>
    </linearGradient>
    <linearGradient id="pipeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcf3f0"/>

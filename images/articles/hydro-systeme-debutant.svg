    <linearGradient id="leafLightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92e8b9"/>
      <stop offset="100%" stop-color="#38b883"/>
    </linearGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0d5d66" flood-opacity="0.12"/>
    </filter>
  </defs>


<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Quand changer l eau en hydroponie</title>
  <desc id="desc">Illustration d un petit reservoir hydroponique avec niveau d eau, repere de renouvellement et solution propre pour debutant.</desc>

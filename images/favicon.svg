    <path d="M263 191c0 56 25 99 75 131" fill="none" stroke="#006a8e" stroke-width="10" stroke-linecap="round"/>
    <path d="M267 191c40-26 54-65 42-116-38 35-50 72-36 116h-6z" fill="url(#leafGradient)"/>
    <path d="M262 204c-37-30-75-37-116-21 38 29 76 34 116 21z" fill="url(#leafGradient)"/>

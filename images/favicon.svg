<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">HydroFacile</title>
  <desc id="desc">Icone HydroFacile avec une goutte bleue et une pousse verte sur fond blanc arrondi.</desc>
  <defs>
    <linearGradient id="tileGradient" x1="18%" y1="10%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbfb"/>
    </linearGradient>
    <linearGradient id="dropGradient" x1="35%" y1="8%" x2="72%" y2="96%">
      <stop offset="0%" stop-color="#76d7f1"/>
      <stop offset="47%" stop-color="#00a5d0"/>
      <stop offset="100%" stop-color="#0069a8"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="20%" y1="12%" x2="86%" y2="88%">
      <stop offset="0%" stop-color="#8edb27"/>
      <stop offset="100%" stop-color="#19833d"/>
    </linearGradient>
    <filter id="tileShadow" x="-16%" y="-16%" width="132%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0e2730" flood-opacity="0.18"/>
    </filter>
